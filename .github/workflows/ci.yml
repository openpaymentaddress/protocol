name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run check
